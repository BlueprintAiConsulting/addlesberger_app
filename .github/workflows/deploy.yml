name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create .env
        run: |
          cat <<'EOF' > .env
          VITE_FIREBASE_API_KEY=AIzaSyDB_z2t6tpp31HXy2-u2JZNgyIyx9QZgK0
          VITE_FIREBASE_AUTH_DOMAIN=addlesberger-app.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=addlesberger-app
          VITE_FIREBASE_STORAGE_BUCKET=addlesberger-app.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=697460116517
          VITE_FIREBASE_APP_ID=1:697460116517:web:40e997ac315c36dce503cc
          VITE_COMPANY_ID=default-company
          VITE_ALLOWED_EMAILS=rladdlesbergerroofing@gmail.com,drewhufnagle@gmail.com
          EOF

      - run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
